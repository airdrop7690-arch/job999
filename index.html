<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Construction Mix Counter</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1814;
    --surface2: #242018;
    --border: #2e2a22;
    --sand: #e8a832;
    --sand-dim: #7a5a1a;
    --sand-glow: rgba(232,168,50,0.18);
    --stone: #8fa3b0;
    --stone-dim: #3d4f59;
    --stone-glow: rgba(143,163,176,0.15);
    --cement: #c7bfb2;
    --cement-dim: #5a5249;
    --cement-glow: rgba(199,191,178,0.13);
    --success: #4ecb71;
    --success-glow: rgba(78,203,113,0.25);
    --danger: #e05555;
    --text: #f0ebe3;
    --text-dim: #7a7060;
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    position: relative;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(232,168,50,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(143,163,176,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    max-width: 480px;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .logo-icon {
    font-size: 28px;
    filter: drop-shadow(0 0 8px rgba(232,168,50,0.5));
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 8vw, 3rem);
    letter-spacing: 0.04em;
    background: linear-gradient(135deg, #f0d080 0%, #e8a832 50%, #c07820 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.01em;
    margin-top: 10px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--sand);
    box-shadow: 0 0 6px var(--sand);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Total Mix Card */
  .total-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }

  .total-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(78,203,113,0.05) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.4s;
  }

  .total-card.celebrate::before { opacity: 1; }

  .total-label {
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .total-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem;
    color: var(--success);
    line-height: 1;
    text-shadow: 0 0 20px var(--success-glow);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  .total-value.bump {
    transform: scale(1.2);
  }

  .mix-icon {
    font-size: 2.8rem;
    opacity: 0.18;
  }

  /* Progress Bar */
  .progress-section {
    margin-bottom: 20px;
  }

  .progress-label {
    font-size: 0.72rem;
    color: var(--text-dim);
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }

  .progress-track {
    height: 6px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sand-dim), var(--sand));
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(0.34,1.2,0.64,1);
    width: 0%;
  }

  /* Buttons Grid */
  .buttons-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .mat-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    transition: transform 0.13s, box-shadow 0.2s, border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .mat-btn:active {
    transform: scale(0.93);
  }

  /* Sand button */
  .btn-sand { border-color: var(--sand-dim); }
  .btn-sand:hover { border-color: var(--sand); background: var(--sand-glow); box-shadow: 0 0 24px var(--sand-glow); }
  .btn-sand .mat-icon { color: var(--sand); text-shadow: 0 0 12px rgba(232,168,50,0.5); }
  .btn-sand .mat-count { color: var(--sand); }
  .btn-sand .mat-need { background: rgba(232,168,50,0.1); color: var(--sand); border-color: var(--sand-dim); }

  /* Stone button */
  .btn-stone { border-color: var(--stone-dim); }
  .btn-stone:hover { border-color: var(--stone); background: var(--stone-glow); box-shadow: 0 0 24px var(--stone-glow); }
  .btn-stone .mat-icon { color: var(--stone); text-shadow: 0 0 12px rgba(143,163,176,0.5); }
  .btn-stone .mat-count { color: var(--stone); }
  .btn-stone .mat-need { background: rgba(143,163,176,0.08); color: var(--stone); border-color: var(--stone-dim); }

  /* Cement button */
  .btn-cement { border-color: var(--cement-dim); }
  .btn-cement:hover { border-color: var(--cement); background: var(--cement-glow); box-shadow: 0 0 24px var(--cement-glow); }
  .btn-cement .mat-icon { color: var(--cement); text-shadow: 0 0 12px rgba(199,191,178,0.4); }
  .btn-cement .mat-count { color: var(--cement); }
  .btn-cement .mat-need { background: rgba(199,191,178,0.06); color: var(--cement); border-color: var(--cement-dim); }

  .mat-icon {
    font-size: 2rem;
    line-height: 1;
    transition: transform 0.2s;
  }

  .mat-btn:active .mat-icon {
    transform: scale(1.3) rotate(-8deg);
  }

  .mat-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.06em;
    color: var(--text);
    text-align: center;
    line-height: 1.1;
  }

  .mat-subname {
    font-size: 0.62rem;
    color: var(--text-dim);
    font-weight: 500;
  }

  .mat-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    line-height: 1;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }

  .mat-count.pop {
    transform: scale(1.4);
  }

  .mat-need {
    font-size: 0.6rem;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 99px;
    border: 1px solid;
    letter-spacing: 0.05em;
  }

  /* Ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    transform: scale(0);
    animation: ripple-out 0.5s linear;
    pointer-events: none;
    opacity: 0.25;
  }

  .btn-sand .ripple { background: var(--sand); }
  .btn-stone .ripple { background: var(--stone); }
  .btn-cement .ripple { background: var(--cement); }

  @keyframes ripple-out {
    to { transform: scale(4); opacity: 0; }
  }

  /* Counters mini cards */
  .counters-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .counter-mini {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
  }

  .counter-mini-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .counter-mini-bar {
    height: 3px;
    border-radius: 99px;
    margin-top: 6px;
    overflow: hidden;
    background: var(--border);
  }

  .counter-mini-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(0.34,1.2,0.64,1);
  }

  .fill-sand { background: var(--sand); }
  .fill-stone { background: var(--stone); }
  .fill-cement { background: var(--cement); }

  /* Reset */
  .reset-btn {
    width: 100%;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--danger);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.2s, border-color 0.2s, transform 0.13s;
    -webkit-tap-highlight-color: transparent;
  }

  .reset-btn:hover {
    background: rgba(224,85,85,0.08);
    border-color: rgba(224,85,85,0.4);
  }

  .reset-btn:active { transform: scale(0.97); }

  /* Celebration overlay */
  .celebrate-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
  }

  .celebrate-overlay.show {
    animation: celebrate-flash 1.2s ease-out forwards;
  }

  @keyframes celebrate-flash {
    0% { opacity: 0; }
    20% { opacity: 1; }
    100% { opacity: 0; }
  }

  .celebrate-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 12vw, 5rem);
    color: var(--success);
    text-shadow: 0 0 40px var(--success), 0 0 80px var(--success-glow);
    text-align: center;
    letter-spacing: 0.06em;
    animation: celebrate-rise 1.2s ease-out forwards;
  }

  @keyframes celebrate-rise {
    0% { transform: translateY(30px) scale(0.8); opacity: 0; }
    30% { transform: translateY(-10px) scale(1.05); opacity: 1; }
    70% { transform: translateY(-20px) scale(1); opacity: 1; }
    100% { transform: translateY(-40px) scale(0.9); opacity: 0; }
  }

  /* Particles */
  .particle {
    position: fixed;
    width: 8px; height: 8px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 998;
  }

  /* Footer */
  footer {
    text-align: center;
    margin-top: 28px;
    font-size: 0.65rem;
    color: var(--text-dim);
    opacity: 0.5;
    letter-spacing: 0.06em;
  }

  /* Shake on over-click */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-5px) rotate(-1deg); }
    75% { transform: translateX(5px) rotate(1deg); }
  }

  .shake {
    animation: shake 0.3s ease;
  }

  /* Satisfied indicator */
  .sat-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    display: inline-block;
    margin-left: 4px;
    transition: background 0.3s, box-shadow 0.3s;
  }

  .sat-dot.met {
    background: var(--success);
    box-shadow: 0 0 6px var(--success);
  }

  .sat-dot.unmet { background: var(--border); }

  /* Responsive */
  @media (max-width: 360px) {
    .mat-name { font-size: 0.95rem; }
    .mat-count { font-size: 1.9rem; }
    .mat-icon { font-size: 1.7rem; }
  }
</style>
</head>
<body>

<div class="wrapper">

  <!-- Header -->
  <header>
    <div class="logo-row">
      <span class="logo-icon">🏗️</span>
      <h1>Construction Mix Counter</h1>
    </div>
    <div class="status-badge">
      <span class="status-dot"></span>
      Need 6 Sand + 3 Stone + 1 Cement to complete 1 Mix
    </div>
  </header>

  <!-- Total Mix Card -->
  <div class="total-card" id="totalCard">
    <div>
      <div class="total-label">Total Mixes Completed</div>
      <div class="total-value" id="totalValue">0</div>
      <div style="font-size:0.72rem;color:var(--text-dim);margin-top:4px;">
        <span id="reqDots">
          <span class="sat-dot unmet" id="dot-sand"></span>
          <span class="sat-dot unmet" id="dot-stone"></span>
          <span class="sat-dot unmet" id="dot-cement"></span>
        </span>
        &nbsp;conditions met
      </div>
    </div>
    <div class="mix-icon">🪣</div>
  </div>

  <!-- Overall Progress -->
  <div class="progress-section">
    <div class="progress-label">
      <span>Mix Progress</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Main Buttons -->
  <div class="buttons-grid">

    <button class="mat-btn btn-sand" id="btnSand" onclick="handleClick('sand')">
      <span class="mat-icon">🏖️</span>
      <div>
        <div class="mat-name">Sand</div>
        <div class="mat-subname">Bali</div>
      </div>
      <div class="mat-count" id="sandCount">0</div>
      <div class="mat-need">Need 6</div>
    </button>

    <button class="mat-btn btn-stone" id="btnStone" onclick="handleClick('stone')">
      <span class="mat-icon">🪨</span>
      <div>
        <div class="mat-name">Stone</div>
        <div class="mat-subname">Pathor</div>
      </div>
      <div class="mat-count" id="stoneCount">0</div>
      <div class="mat-need">Need 3</div>
    </button>

    <button class="mat-btn btn-cement" id="btnCement" onclick="handleClick('cement')">
      <span class="mat-icon">🧱</span>
      <div>
        <div class="mat-name">Cement</div>
        <div class="mat-subname">सीमेंट</div>
      </div>
      <div class="mat-count" id="cementCount">0</div>
      <div class="mat-need">Need 1</div>
    </button>

  </div>

  <!-- Mini counter bars -->
  <div class="counters-row">
    <div class="counter-mini">
      <div class="counter-mini-label">Sand</div>
      <div style="font-family:'Bebas Neue';font-size:1.3rem;color:var(--sand)" id="sandMini">0 / 6</div>
      <div class="counter-mini-bar"><div class="counter-mini-fill fill-sand" id="sandBar" style="width:0%"></div></div>
    </div>
    <div class="counter-mini">
      <div class="counter-mini-label">Stone</div>
      <div style="font-family:'Bebas Neue';font-size:1.3rem;color:var(--stone)" id="stoneMini">0 / 3</div>
      <div class="counter-mini-bar"><div class="counter-mini-fill fill-stone" id="stoneBar" style="width:0%"></div></div>
    </div>
    <div class="counter-mini">
      <div class="counter-mini-label">Cement</div>
      <div style="font-family:'Bebas Neue';font-size:1.3rem;color:var(--cement)" id="cementMini">0 / 1</div>
      <div class="counter-mini-bar"><div class="counter-mini-fill fill-cement" id="cementBar" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Reset Button -->
  <button class="reset-btn" onclick="resetAll()">
    <span>⟳</span>
    Reset Everything
  </button>

  <footer>Construction Mix Counter &nbsp;·&nbsp; Data saved locally</footer>
</div>

<!-- Celebrate overlay -->
<div class="celebrate-overlay" id="celebrateOverlay">
  <div class="celebrate-text">MIX COMPLETE! 🎉</div>
</div>

<!-- Audio context for click sound -->
<script>
  // ── State ──────────────────────────────────────────────────────────
  const TARGETS = { sand: 6, stone: 3, cement: 1 };
  let state = {
    sand: 0,
    stone: 0,
    cement: 0,
    total: parseInt(localStorage.getItem('mixTotal') || '0')
  };

  // ── Audio ──────────────────────────────────────────────────────────
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let ctx;
  function getCtx() {
    if (!ctx) ctx = new AudioCtx();
    return ctx;
  }

  function playClick(type) {
    try {
      const c = getCtx();
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.connect(gain);
      gain.connect(c.destination);
      const freqs = { sand: 440, stone: 330, cement: 520 };
      osc.frequency.value = freqs[type] || 440;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.18, c.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.18);
      osc.start(c.currentTime);
      osc.stop(c.currentTime + 0.18);
    } catch(e) {}
  }

  function playSuccess() {
    try {
      const c = getCtx();
      [523, 659, 784, 1047].forEach((freq, i) => {
        const osc = c.createOscillator();
        const gain = c.createGain();
        osc.connect(gain);
        gain.connect(c.destination);
        osc.frequency.value = freq;
        osc.type = 'triangle';
        const t = c.currentTime + i * 0.12;
        gain.gain.setValueAtTime(0.2, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
        osc.start(t);
        osc.stop(t + 0.3);
      });
    } catch(e) {}
  }

  // ── Vibration ─────────────────────────────────────────────────────
  function vibrate(pattern) {
    if (navigator.vibrate) navigator.vibrate(pattern);
  }

  // ── Ripple effect ─────────────────────────────────────────────────
  function spawnRipple(btn, e) {
    const rect = btn.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    const r = document.createElement('div');
    r.className = 'ripple';
    const size = Math.max(rect.width, rect.height) * 1.5;
    r.style.cssText = `width:${size}px;height:${size}px;left:${x - size/2}px;top:${y - size/2}px;`;
    btn.appendChild(r);
    r.addEventListener('animationend', () => r.remove());
  }

  // ── Particles on success ──────────────────────────────────────────
  function spawnParticles() {
    const colors = ['#e8a832','#4ecb71','#8fa3b0','#c7bfb2','#f0d080'];
    for (let i = 0; i < 22; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      const startX = window.innerWidth / 2 + (Math.random() - 0.5) * 100;
      const startY = window.innerHeight / 2;
      p.style.left = startX + 'px';
      p.style.top = startY + 'px';
      document.body.appendChild(p);
      const angle = Math.random() * Math.PI * 2;
      const speed = 120 + Math.random() * 200;
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed - 120;
      let startTime = null;
      const dur = 900 + Math.random() * 400;
      function animP(ts) {
        if (!startTime) startTime = ts;
        const elapsed = ts - startTime;
        const t = elapsed / dur;
        if (t >= 1) { p.remove(); return; }
        p.style.left = (startX + vx * t) + 'px';
        p.style.top = (startY + vy * t + 180 * t * t) + 'px';
        p.style.opacity = 1 - t;
        p.style.transform = `scale(${1 - t * 0.5}) rotate(${t * 360}deg)`;
        requestAnimationFrame(animP);
      }
      requestAnimationFrame(animP);
    }
  }

  // ── Update UI ─────────────────────────────────────────────────────
  function updateUI(animated = true) {
    // Counts
    document.getElementById('sandCount').textContent = state.sand;
    document.getElementById('stoneCount').textContent = state.stone;
    document.getElementById('cementCount').textContent = state.cement;

    // Mini
    document.getElementById('sandMini').textContent = `${state.sand} / 6`;
    document.getElementById('stoneMini').textContent = `${state.stone} / 3`;
    document.getElementById('cementMini').textContent = `${state.cement} / 1`;

    // Bars
    document.getElementById('sandBar').style.width = Math.min(state.sand / 6 * 100, 100) + '%';
    document.getElementById('stoneBar').style.width = Math.min(state.stone / 3 * 100, 100) + '%';
    document.getElementById('cementBar').style.width = Math.min(state.cement / 1 * 100, 100) + '%';

    // Total
    document.getElementById('totalValue').textContent = state.total;

    // Dots
    document.getElementById('dot-sand').className = 'sat-dot ' + (state.sand >= 6 ? 'met' : 'unmet');
    document.getElementById('dot-stone').className = 'sat-dot ' + (state.stone >= 3 ? 'met' : 'unmet');
    document.getElementById('dot-cement').className = 'sat-dot ' + (state.cement >= 1 ? 'met' : 'unmet');

    // Overall progress (weighted: sand 6 pts, stone 3 pts, cement 1 pt = 10 total)
    const progress = (Math.min(state.sand,6) + Math.min(state.stone,3) + Math.min(state.cement,1)) / 10 * 100;
    document.getElementById('progressFill').style.width = progress + '%';
    document.getElementById('progressPct').textContent = Math.round(progress) + '%';
  }

  // ── Pop animation helper ──────────────────────────────────────────
  function popEl(id) {
    const el = document.getElementById(id);
    el.classList.remove('pop');
    void el.offsetWidth;
    el.classList.add('pop');
    el.addEventListener('transitionend', () => el.classList.remove('pop'), { once: true });
  }

  // ── Check for complete mix ────────────────────────────────────────
  function checkMix() {
    if (state.sand >= 6 && state.stone >= 3 && state.cement >= 1) {
      state.total += 1;
      state.sand = 0;
      state.stone = 0;
      state.cement = 0;
      localStorage.setItem('mixTotal', state.total);

      // Celebration
      playSuccess();
      vibrate([50, 30, 80, 30, 120]);
      spawnParticles();

      const overlay = document.getElementById('celebrateOverlay');
      overlay.classList.remove('show');
      void overlay.offsetWidth;
      overlay.classList.add('show');

      const totalCard = document.getElementById('totalCard');
      totalCard.classList.add('celebrate');
      setTimeout(() => totalCard.classList.remove('celebrate'), 1500);

      popEl('totalValue');

      updateUI(true);
    }
  }

  // ── Main click handler ────────────────────────────────────────────
  function handleClick(type) {
    const maxes = { sand: 6, stone: 3, cement: 1 };
    const btnIds = { sand: 'btnSand', stone: 'btnStone', cement: 'btnCement' };

    if (state[type] >= maxes[type]) {
      // Shake: already at max
      const btn = document.getElementById(btnIds[type]);
      btn.classList.remove('shake');
      void btn.offsetWidth;
      btn.classList.add('shake');
      btn.addEventListener('animationend', () => btn.classList.remove('shake'), { once: true });
      vibrate(30);
      return;
    }

    state[type] += 1;
    playClick(type);
    vibrate(15);

    const countIds = { sand: 'sandCount', stone: 'stoneCount', cement: 'cementCount' };
    popEl(countIds[type]);

    updateUI(true);
    checkMix();
  }

  // ── Reset all ─────────────────────────────────────────────────────
  function resetAll() {
    state = { sand: 0, stone: 0, cement: 0, total: 0 };
    localStorage.removeItem('mixTotal');
    vibrate([40, 20, 40]);
    updateUI(false);
  }

  // ── Add ripple on click ───────────────────────────────────────────
  ['btnSand', 'btnStone', 'btnCement'].forEach(id => {
    const btn = document.getElementById(id);
    btn.addEventListener('pointerdown', (e) => spawnRipple(btn, e));
  });

  // ── Init ──────────────────────────────────────────────────────────
  updateUI(false);
</script>
</body>
</html>
